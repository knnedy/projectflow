basePath: /api/v1
definitions:
  handler.ActivityLogResponse:
    properties:
      action:
        type: string
      actor_id:
        type: string
      created_at:
        type: string
      entity_id:
        type: string
      entity_type:
        type: string
      id:
        type: string
      metadata: {}
      organisation_id:
        type: string
      project_id:
        type: string
    type: object
  handler.ActivityPageResponse:
    properties:
      has_more:
        type: boolean
      logs:
        items:
          $ref: '#/definitions/handler.ActivityLogResponse'
        type: array
      next_cursor:
        type: string
    type: object
  handler.CommentResponse:
    properties:
      author_id:
        type: string
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      issue_id:
        type: string
      updated_at:
        type: string
    type: object
  handler.ErrorDetail:
    properties:
      code:
        type: string
      field:
        type: string
      message:
        type: string
    type: object
  handler.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/handler.ErrorDetail'
      success:
        type: boolean
    type: object
  handler.InviteResponse:
    properties:
      email:
        type: string
      expires_at:
        type: string
      invite_link:
        type: string
      role:
        type: string
    type: object
  handler.IssueResponse:
    properties:
      assignee_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      priority:
        type: string
      project_id:
        type: string
      reporter_id:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  handler.MemberResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      organisation_id:
        type: string
      role:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  handler.OrgResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      updated_at:
        type: string
    type: object
  handler.ProjectResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      organisation_id:
        type: string
      updated_at:
        type: string
    type: object
  handler.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  handler.authDataResponse:
    properties:
      access_token:
        type: string
      user:
        $ref: '#/definitions/handler.UserResponse'
    type: object
  repository.IssuePriority:
    enum:
    - NO_PRIORITY
    - LOW
    - MEDIUM
    - HIGH
    type: string
    x-enum-varnames:
    - IssuePriorityNOPRIORITY
    - IssuePriorityLOW
    - IssuePriorityMEDIUM
    - IssuePriorityHIGH
  repository.IssueStatus:
    enum:
    - BACKLOG
    - TODO
    - IN_PROGRESS
    - IN_REVIEW
    - DONE
    - CANCELLED
    type: string
    x-enum-varnames:
    - IssueStatusBACKLOG
    - IssueStatusTODO
    - IssueStatusINPROGRESS
    - IssueStatusINREVIEW
    - IssueStatusDONE
    - IssueStatusCANCELLED
  repository.MemberRole:
    enum:
    - OWNER
    - ADMIN
    - MEMBER
    type: string
    x-enum-varnames:
    - MemberRoleOWNER
    - MemberRoleADMIN
    - MemberRoleMEMBER
  service.CreateCommentInput:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
    required:
    - content
    type: object
  service.CreateIssueInput:
    properties:
      assigneeID:
        type: string
      description:
        maxLength: 2000
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/repository.IssuePriority'
        enum:
        - NO_PRIORITY
        - LOW
        - MEDIUM
        - HIGH
      title:
        maxLength: 200
        minLength: 2
        type: string
    required:
    - priority
    - title
    type: object
  service.CreateOrgInput:
    properties:
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - name
    type: object
  service.CreateProjectInput:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - name
    type: object
  service.InviteMemberInput:
    properties:
      email:
        type: string
      role:
        allOf:
        - $ref: '#/definitions/repository.MemberRole'
        enum:
        - ADMIN
        - MEMBER
    required:
    - email
    - role
    type: object
  service.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  service.RegisterInput:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      password:
        maxLength: 100
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  service.UpdateCommentInput:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
    required:
    - content
    type: object
  service.UpdateIssueDetailsInput:
    properties:
      assigneeID:
        type: string
      description:
        maxLength: 2000
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/repository.IssuePriority'
        enum:
        - NO_PRIORITY
        - LOW
        - MEDIUM
        - HIGH
      title:
        maxLength: 200
        minLength: 2
        type: string
    required:
    - priority
    - title
    type: object
  service.UpdateIssueStatusInput:
    properties:
      status:
        allOf:
        - $ref: '#/definitions/repository.IssueStatus'
        enum:
        - BACKLOG
        - TODO
        - IN_PROGRESS
        - IN_REVIEW
        - DONE
        - CANCELLED
    required:
    - status
    type: object
  service.UpdateMemberRoleInput:
    properties:
      role:
        allOf:
        - $ref: '#/definitions/repository.MemberRole'
        enum:
        - OWNER
        - ADMIN
        - MEMBER
    required:
    - role
    type: object
  service.UpdateOrgInput:
    properties:
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - name
    type: object
  service.UpdatePasswordInput:
    properties:
      currentPassword:
        minLength: 8
        type: string
      newPassword:
        maxLength: 100
        minLength: 8
        type: string
    required:
    - currentPassword
    - newPassword
    type: object
  service.UpdateProfileInput:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - email
    - name
    type: object
  service.UpdateProjectInput:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - name
    type: object
host: localhost:8080
info:
  contact: {}
  description: Project management API
  title: ProjectFlow API
  version: "1.0"
paths:
  /activity/{entityID}:
    get:
      parameters:
      - description: Entity ID
        in: path
        name: entityID
        required: true
        type: string
      - description: Cursor for pagination
        in: query
        name: cursor
        type: string
      - description: Number of logs to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ActivityPageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: List activity logs for a specific entity
      tags:
      - activity
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login input
        in: body
        name: body
        required: true
        schema:
